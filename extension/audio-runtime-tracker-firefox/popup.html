<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audio Runtime Tracker</title>
    <style>
      body {
        font-family: Segoe UI, sans-serif;
        background: #10131a;
        color: #e8edf7;
        width: 300px;
        margin: 0;
        padding: 14px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .muted {
        color: #a8b2c5;
        font-size: 12px;
        margin-top: 8px;
      }

      .row {
        display: flex;
        justify-content: space-between;
        margin-top: 8px;
      }

      .label {
        color: #b7c0d3;
      }

      .value {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Audio Runtime Tracker</h1>
    <div class="row"><span class="label">Status</span><span class="value" id="status">Idle</span></div>
    <div class="row"><span class="label">Audible</span><span class="value" id="audible">No</span></div>
    <div class="row"><span class="label">Tracked time</span><span class="value" id="seconds">0s</span></div>
    <p class="muted">Keep this extension enabled while watching. Your site uses these updates to track runtime accurately.</p>
    <script src="popup.js"></script>
  </body>
</html>
